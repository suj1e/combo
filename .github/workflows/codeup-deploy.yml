name: "Codeup Deploy"

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  deploy-to-codeup:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven
          server-id: codeup-repo
          settings-path: ${{ github.workspace }}

      - name: Create settings.xml
        run: |
          cat << EOF > ${{ github.workspace }}/settings.xml
          <settings>
            <servers>
              <server>
                <id>codeup-repo</id>
                <username>${{ secrets.CODEUP_USERNAME }}</username>
                <password>${{ secrets.CODEUP_PASSWORD }}</password>
              </server>
            </servers>
          </settings>
          EOF

      - name: Publish to Codeup Artifact Repository
        run: mvn deploy -s ${{ github.workspace }}/settings.xml -DaltSnapshotDeploymentRepository=codeup-repo::default::${{ secrets.CODEUP_SNAPSHOT_REPO_URL }}